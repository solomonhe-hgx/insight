<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="400" fill="#0f172a" rx="16"/>
    
    <!-- Title -->
    <text x="450" y="35" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">传统随机访存 vs 批量顺序访存</text>
    
    <!-- Left: Random Access -->
    <rect x="30" y="60" width="400" height="310" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="230" y="90" fill="#ef4444" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">传统方式: 随机访存</text>
    <text x="230" y="110" fill="#64748b" font-size="11" text-anchor="middle" font-family="system-ui">Row Buffer Miss 率 80-90%</text>
    
    <!-- DRAM Banks visualization -->
    <g transform="translate(50, 130)">
        <!-- Bank 0 -->
        <rect x="0" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="30" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 0</text>
        <rect x="5" y="30" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        <rect x="5" y="80" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        <rect x="5" y="150" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        
        <!-- Bank 1 -->
        <rect x="80" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="110" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 1</text>
        <rect x="85" y="60" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        <rect x="85" y="130" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        
        <!-- Bank 2 -->
        <rect x="160" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="190" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 2</text>
        <rect x="165" y="40" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        <rect x="165" y="100" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        <rect x="165" y="170" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        
        <!-- Bank 3 -->
        <rect x="240" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="270" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 3</text>
        <rect x="245" y="50" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        <rect x="245" y="120" width="50" height="12" rx="3" fill="#ef4444" opacity="0.7"/>
        
        <!-- Random access arrows -->
        <path d="M 30,36 Q 110,66 110,66" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
        <path d="M 110,66 Q 190,46 190,46" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
        <path d="M 190,46 Q 270,56 270,56" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.6"/>
    </g>
    
    <!-- Right: Batch Sequential Access -->
    <rect x="470" y="60" width="400" height="310" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="670" y="90" fill="#10b981" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">本发明方式: 批量顺序访存</text>
    <text x="670" y="110" fill="#64748b" font-size="11" text-anchor="middle" font-family="system-ui">Row Buffer Hit 率 70-80%</text>
    
    <!-- DRAM Banks visualization -->
    <g transform="translate(490, 130)">
        <!-- Bank 0 -->
        <rect x="0" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="30" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 0</text>
        <rect x="5" y="30" width="50" height="60" rx="4" fill="#10b981" opacity="0.7"/>
        <text x="30" y="65" fill="white" font-size="9" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Bank 1 -->
        <rect x="80" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="110" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 1</text>
        <rect x="85" y="40" width="50" height="80" rx="4" fill="#10b981" opacity="0.7"/>
        <text x="110" y="85" fill="white" font-size="9" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Bank 2 -->
        <rect x="160" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="190" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 2</text>
        <rect x="165" y="30" width="50" height="100" rx="4" fill="#10b981" opacity="0.7"/>
        <text x="190" y="85" fill="white" font-size="9" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Bank 3 -->
        <rect x="240" y="0" width="60" height="200" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
        <text x="270" y="20" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="system-ui">Bank 3</text>
        <rect x="245" y="40" width="50" height="70" rx="4" fill="#10b981" opacity="0.7"/>
        <text x="270" y="80" fill="white" font-size="9" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Sequential arrows -->
        <line x1="30" y1="60" x2="110" y2="80" stroke="#10b981" stroke-width="2"/>
        <line x1="110" y1="80" x2="190" y1="70" stroke="#10b981" stroke-width="2"/>
        <line x1="190" y1="70" x2="270" y1="75" stroke="#10b981" stroke-width="2"/>
    </g>
    
    <!-- Performance comparison -->
    <rect x="30" y="375" width="400" height="20" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="230" y="389" fill="#ef4444" font-size="11" text-anchor="middle" font-family="system-ui">延迟高: 4×N 次随机 DRAM 访问</text>
    
    <rect x="470" y="375" width="400" height="20" rx="4" fill="#10b981" opacity="0.3"/>
    <text x="670" y="389" fill="#10b981" font-size="11" text-anchor="middle" font-family="system-ui">延迟低: ~N 次顺序 DRAM 访问 (降低 30-50%)</text>
</svg>