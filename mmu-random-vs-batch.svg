<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
    <!-- Light background for better contrast -->
    <rect width="900" height="420" fill="#f8fafc" rx="12"/>
    
    <!-- Title -->
    <text x="450" y="35" fill="#1e293b" font-size="20" font-weight="bold" text-anchor="middle" font-family="system-ui">传统随机访存 vs 批量顺序访存对比</text>
    
    <!-- ==================== LEFT: Random Access ==================== -->
    <!-- Card background -->
    <rect x="30" y="60" width="400" height="330" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="3"/>
    
    <!-- Header -->
    <rect x="30" y="60" width="400" height="45" rx="10" fill="#ef4444"/>
    <rect x="30" y="85" width="400" height="20" fill="#ef4444"/>
    <text x="230" y="90" fill="white" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">传统方式：随机访存</text>
    
    <!-- Subtitle -->
    <text x="230" y="130" fill="#64748b" font-size="13" text-anchor="middle" font-family="system-ui">Row Buffer Miss 率 80-90%</text>
    
    <!-- DRAM Banks -->
    <g transform="translate(50, 150)">
        <!-- Bank labels -->
        <text x="45" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 0</text>
        <text x="135" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 1</text>
        <text x="225" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 2</text>
        <text x="315" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 3</text>
        
        <!-- Bank 0 - scattered accesses -->
        <rect x="10" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="15" y="40" width="60" height="18" rx="4" fill="#ef4444"/>
        <rect x="15" y="95" width="60" height="18" rx="4" fill="#ef4444"/>
        <rect x="15" y="160" width="60" height="18" rx="4" fill="#ef4444"/>
        
        <!-- Bank 1 - scattered accesses -->
        <rect x="100" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="105" y="65" width="60" height="18" rx="4" fill="#ef4444"/>
        <rect x="105" y="130" width="60" height="18" rx="4" fill="#ef4444"/>
        
        <!-- Bank 2 - scattered accesses -->
        <rect x="190" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="195" y="50" width="60" height="18" rx="4" fill="#ef4444"/>
        <rect x="195" y="110" width="60" height="18" rx="4" fill="#ef4444"/>
        <rect x="195" y="170" width="60" height="18" rx="4" fill="#ef4444"/>
        
        <!-- Bank 3 - scattered accesses -->
        <rect x="280" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="285" y="75" width="60" height="18" rx="4" fill="#ef4444"/>
        <rect x="285" y="140" width="60" height="18" rx="4" fill="#ef4444"/>
        
        <!-- Random access pattern arrows -->
        <path d="M 45,49 Q 135,74 135,74" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
        <path d="M 135,74 Q 225,59 225,59" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
        <path d="M 225,59 Q 315,84 315,84" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
        <path d="M 315,84 Q 225,119 225,119" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
    </g>
    
    <!-- Performance label -->
    <rect x="50" y="355" width="360" height="25" rx="6" fill="#fee2e2"/>
    <text x="230" y="372" fill="#dc2626" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui">❌ 延迟高：4×N 次随机 DRAM 访问</text>
    
    <!-- ==================== RIGHT: Batch Sequential Access ==================== -->
    <!-- Card background -->
    <rect x="470" y="60" width="400" height="330" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="3"/>
    
    <!-- Header -->
    <rect x="470" y="60" width="400" height="45" rx="10" fill="#10b981"/>
    <rect x="470" y="85" width="400" height="20" fill="#10b981"/>
    <text x="670" y="90" fill="white" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">本发明方式：批量顺序访存</text>
    
    <!-- Subtitle -->
    <text x="670" y="130" fill="#64748b" font-size="13" text-anchor="middle" font-family="system-ui">Row Buffer Hit 率 70-80%</text>
    
    <!-- DRAM Banks -->
    <g transform="translate(490, 150)">
        <!-- Bank labels -->
        <text x="45" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 0</text>
        <text x="135" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 1</text>
        <text x="225" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 2</text>
        <text x="315" y="15" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle" font-family="system-ui">Bank 3</text>
        
        <!-- Bank 0 - batch access -->
        <rect x="10" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="15" y="40" width="60" height="80" rx="4" fill="#10b981"/>
        <text x="45" y="85" fill="white" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Bank 1 - batch access -->
        <rect x="100" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="105" y="50" width="60" height="100" rx="4" fill="#10b981"/>
        <text x="135" y="105" fill="white" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Bank 2 - batch access -->
        <rect x="190" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="195" y="35" width="60" height="120" rx="4" fill="#10b981"/>
        <text x="225" y="100" fill="white" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Bank 3 - batch access -->
        <rect x="280" y="25" width="70" height="180" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
        <rect x="285" y="45" width="60" height="90" rx="4" fill="#10b981"/>
        <text x="315" y="95" fill="white" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui">批量</text>
        
        <!-- Sequential access arrows -->
        <line x1="45" y1="80" x2="135" y2="100" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
        <line x1="135" y1="100" x2="225" y2="95" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
        <line x1="225" y1="95" x2="315" y2="90" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
    </g>
    
    <!-- Performance label -->
    <rect x="490" y="355" width="360" height="25" rx="6" fill="#d1fae5"/>
    <text x="670" y="372" fill="#059669" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui">✓ 延迟低：~N 次顺序 DRAM 访问（降低 30-50%）</text>
    
    <!-- Arrow markers -->
    <defs>
        <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
        </marker>
    </defs>
</svg>
