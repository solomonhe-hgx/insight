<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="300" fill="#0f172a" rx="16"/>
    
    <!-- Title -->
    <text x="450" y="35" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">Locality-Aware TLB Prefetching 工作原理</text>
    
    <!-- Step 1: Access Pattern Detection -->
    <rect x="30" y="60" width="250" height="210" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="155" y="90" fill="#3b82f6" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui">访问模式检测</text>
    
    <!-- Access stream -->
    <rect x="50" y="110" width="210" height="30" rx="6" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="155" y="130" fill="#f8fafc" font-size="11" text-anchor="middle" font-family="system-ui">访问序列: VA[0], VA[1], VA[2], ...</text>
    
    <!-- Pattern detected -->
    <rect x="50" y="155" width="210" height="30" rx="6" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
    <text x="155" y="175" fill="#10b981" font-size="11" text-anchor="middle" font-family="system-ui">检测到连续模式: stride=1</text>
    
    <!-- Prefetch trigger -->
    <rect x="50" y="200" width="210" height="30" rx="6" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
    <text x="155" y="220" fill="#f59e0b" font-size="11" text-anchor="middle" font-family="system-ui">触发预取: VA[3], VA[4], VA[5]</text>
    
    <text x="300" y="165" fill="#8b5cf6" font-size="30">→</text>
    
    <!-- Step 2: TLB Prefetch Engine -->
    <rect x="330" y="60" width="250" height="210" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="455" y="90" fill="#8b5cf6" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui">TLB 预取引擎</text>
    
    <!-- TLB entries -->
    <rect x="350" y="110" width="210" height="25" rx="5" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="455" y="127" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">TLB[0]: VA[0] → PA[0] ✓ (命中)</text>
    <rect x="350" y="140" width="210" height="25" rx="5" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1"/>
    <text x="455" y="157" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">TLB[1]: VA[1] → PA[1] ✓ (命中)</text>
    <rect x="350" y="170" width="210" height="25" rx="5" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1"/>
    <text x="455" y="187" fill="#f59e0b" font-size="10" text-anchor="middle" font-family="system-ui">TLB[2]: VA[2] → PA[2] (预取中...)</text>
    <rect x="350" y="200" width="210" height="25" rx="5" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1"/>
    <text x="455" y="217" fill="#f59e0b" font-size="10" text-anchor="middle" font-family="system-ui">TLB[3]: VA[3] → PA[3] (预取中...)</text>
    
    <text x="600" y="165" fill="#8b5cf6" font-size="30">→</text>
    
    <!-- Step 3: Result -->
    <rect x="630" y="60" width="240" height="210" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="750" y="90" fill="#10b981" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui">效果</text>
    
    <rect x="650" y="110" width="200" height="35" rx="6" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
    <text x="750" y="133" fill="#10b981" font-size="12" text-anchor="middle" font-family="system-ui">TLB Miss 率 ↓ 40-60%</text>
    
    <rect x="650" y="155" width="200" height="35" rx="6" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
    <text x="750" y="178" fill="#10b981" font-size="12" text-anchor="middle" font-family="system-ui">页表遍历次数 ↓ 50%</text>
    
    <rect x="650" y="200" width="200" height="35" rx="6" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
    <text x="750" y="223" fill="#10b981" font-size="12" text-anchor="middle" font-family="system-ui">地址翻译延迟 ↓ 35%</text>
</svg>