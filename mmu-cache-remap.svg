<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="380" fill="#0f172a" rx="16"/>
    
    <!-- Title -->
    <text x="450" y="35" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">动态地址重映射: 提升缓存和 TLB 命中率</text>
    
    <!-- Before: Random Mapping -->
    <rect x="30" y="60" width="400" height="290" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="230" y="90" fill="#ef4444" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">重映射前: 随机映射</text>
    
    <!-- Virtual Addresses -->
    <rect x="50" y="110" width="100" height="140" rx="8" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="100" y="130" fill="#3b82f6" font-size="11" text-anchor="middle" font-family="system-ui">虚拟地址</text>
    <rect x="60" y="140" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="100" y="155" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xA100</text>
    <rect x="60" y="165" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="100" y="180" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xB200</text>
    <rect x="60" y="190" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="100" y="205" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xC300</text>
    <rect x="60" y="215" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="100" y="230" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xD400</text>
    
    <!-- Physical Addresses (scattered) -->
    <rect x="200" y="110" width="100" height="140" rx="8" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
    <text x="250" y="130" fill="#f59e0b" font-size="11" text-anchor="middle" font-family="system-ui">物理地址</text>
    <rect x="210" y="140" width="80" height="20" rx="3" fill="rgba(245,158,11,0.3)"/>
    <text x="250" y="155" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x1F00</text>
    <rect x="210" y="190" width="80" height="20" rx="3" fill="rgba(245,158,11,0.3)"/>
    <text x="250" y="205" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x2A00</text>
    <rect x="210" y="165" width="80" height="20" rx="3" fill="rgba(245,158,11,0.3)"/>
    <text x="250" y="180" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x8C00</text>
    <rect x="210" y="215" width="80" height="20" rx="3" fill="rgba(245,158,11,0.3)"/>
    <text x="250" y="230" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x5E00</text>
    
    <!-- Cache lines (conflict) -->
    <rect x="200" y="265" width="180" height="70" rx="8" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
    <text x="290" y="285" fill="#ef4444" font-size="11" text-anchor="middle" font-family="system-ui">L2 Cache Set (冲突)</text>
    <rect x="215" y="295" width="60" height="18" rx="3" fill="#ef4444" opacity="0.6"/>
    <text x="245" y="308" fill="white" font-size="8" text-anchor="middle" font-family="system-ui">Line 0</text>
    <rect x="280" y="295" width="60" height="18" rx="3" fill="#ef4444" opacity="0.6"/>
    <text x="310" y="308" fill="white" font-size="8" text-anchor="middle" font-family="system-ui">Line 1</text>
    <text x="290" y="325" fill="#ef4444" font-size="9" text-anchor="middle" font-family="system-ui">地址映射到相同 Set → 冲突 Miss</text>
    
    <!-- Arrow -->
    <text x="450" y="200" fill="#8b5cf6" font-size="30">→</text>
    
    <!-- After: Optimized Mapping -->
    <rect x="470" y="60" width="400" height="290" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="670" y="90" fill="#10b981" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">重映射后: 缓存友好映射</text>
    
    <!-- Virtual Addresses (same) -->
    <rect x="490" y="110" width="100" height="140" rx="8" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
    <text x="540" y="130" fill="#3b82f6" font-size="11" text-anchor="middle" font-family="system-ui">虚拟地址</text>
    <rect x="500" y="140" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="540" y="155" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xA100</text>
    <rect x="500" y="165" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="540" y="180" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xB200</text>
    <rect x="500" y="190" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="540" y="205" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xC300</text>
    <rect x="500" y="215" width="80" height="20" rx="3" fill="rgba(59,130,246,0.3)"/>
    <text x="540" y="230" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">VA_0xD400</text>
    
    <!-- Physical Addresses (optimized) -->
    <rect x="640" y="110" width="100" height="140" rx="8" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1"/>
    <text x="690" y="130" fill="#10b981" font-size="11" text-anchor="middle" font-family="system-ui">物理地址</text>
    <rect x="650" y="140" width="80" height="20" rx="3" fill="rgba(16,185,129,0.3)"/>
    <text x="690" y="155" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x1000</text>
    <rect x="650" y="165" width="80" height="20" rx="3" fill="rgba(16,185,129,0.3)"/>
    <text x="690" y="180" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x1100</text>
    <rect x="650" y="190" width="80" height="20" rx="3" fill="rgba(16,185,129,0.3)"/>
    <text x="690" y="205" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x1200</text>
    <rect x="650" y="215" width="80" height="20" rx="3" fill="rgba(16,185,129,0.3)"/>
    <text x="690" y="230" fill="#f8fafc" font-size="9" text-anchor="middle" font-family="system-ui">PA_0x1300</text>
    
    <!-- Cache lines (no conflict) -->
    <rect x="640" y="265" width="180" height="70" rx="8" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1"/>
    <text x="730" y="285" fill="#10b981" font-size="11" text-anchor="middle" font-family="system-ui">L2 Cache Set (无冲突)</text>
    <rect x="655" y="295" width="30" height="18" rx="3" fill="#10b981" opacity="0.6"/>
    <text x="670" y="308" fill="white" font-size="8" text-anchor="middle" font-family="system-ui">L0</text>
    <rect x="690" y="295" width="30" height="18" rx="3" fill="#10b981" opacity="0.6"/>
    <text x="705" y="308" fill="white" font-size="8" text-anchor="middle" font-family="system-ui">L1</text>
    <rect x="725" y="295" width="30" height="18" rx="3" fill="#10b981" opacity="0.6"/>
    <text x="740" y="308" fill="white" font-size="8" text-anchor="middle" font-family="system-ui">L2</text>
    <rect x="760" y="295" width="30" height="18" rx="3" fill="#10b981" opacity="0.6"/>
    <text x="775" y="308" fill="white" font-size="8" text-anchor="middle" font-family="system-ui">L3</text>
    <text x="730" y="325" fill="#10b981" font-size="9" text-anchor="middle" font-family="system-ui">地址映射到不同 Set → 无冲突</text>
    
    <!-- Mapping arrows -->
    <path d="M 150,150 Q 190,155 210,150" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow3)" stroke-dasharray="3,2"/>
    <path d="M 150,175 Q 190,195 210,195" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow3)" stroke-dasharray="3,2"/>
    
    <path d="M 590,150 Q 630,145 650,150" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow3)" stroke-dasharray="3,2"/>
    <path d="M 590,175 Q 630,170 650,175" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow3)" stroke-dasharray="3,2"/>
    
    <defs>
        <marker id="arrow3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
        </marker>
    </defs>
</svg>