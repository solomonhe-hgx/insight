<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="520" fill="#0f172a" rx="16"/>
    
    <!-- Title -->
    <text x="450" y="40" fill="#f8fafc" font-size="20" font-weight="bold" text-anchor="middle" font-family="system-ui">GPU MMU 技术栈 - 四大专利关系图</text>
    
    <!-- Layer 1: Hardware (Page Walk Engine) -->
    <rect x="50" y="70" width="800" height="100" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" opacity="0.95"/>
    <rect x="70" y="85" width="8" height="70" rx="4" fill="#3b82f6"/>
    <text x="100" y="105" fill="#3b82f6" font-size="16" font-weight="bold" font-family="system-ui">硬件加速层</text>
    <text x="100" y="125" fill="#94a3b8" font-size="13" font-family="system-ui">US20240202136A1: MMU 页表遍历引擎</text>
    <text x="100" y="145" fill="#64748b" font-size="11" font-family="system-ui">批量地址翻译命令 → 顺序访存优化 → Row Buffer 命中率提升 70%+</text>
    <text x="750" y="125" fill="#3b82f6" font-size="28" font-weight="bold" font-family="system-ui">①</text>
    
    <!-- Arrow -->
    <line x1="450" y1="170" x2="450" y2="200" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- Layer 2: Architecture (Unified Memory) -->
    <rect x="50" y="200" width="800" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" opacity="0.95"/>
    <rect x="70" y="215" width="8" height="70" rx="4" fill="#8b5cf6"/>
    <text x="100" y="235" fill="#8b5cf6" font-size="16" font-weight="bold" font-family="system-ui">统一内存架构层</text>
    <text x="100" y="255" fill="#94a3b8" font-size="13" font-family="system-ui">US9514559B2: CPU/GPU 统一虚拟地址空间</text>
    <text x="100" y="275" fill="#64748b" font-size="11" font-family="system-ui">共享页表 + 按需页迁移 → 零拷贝数据访问 → 编程模型简化</text>
    <text x="750" y="255" fill="#8b5cf6" font-size="28" font-weight="bold" font-family="system-ui">②</text>
    
    <!-- Arrow -->
    <line x1="450" y1="300" x2="450" y2="330" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- Layer 3: Cache Optimization -->
    <rect x="50" y="330" width="800" height="100" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" opacity="0.95"/>
    <rect x="70" y="345" width="8" height="70" rx="4" fill="#10b981"/>
    <text x="100" y="365" fill="#10b981" font-size="16" font-weight="bold" font-family="system-ui">缓存优化层</text>
    <text x="100" y="385" fill="#94a3b8" font-size="13" font-family="system-ui">US11620256B2: 动态地址重映射技术</text>
    <text x="100" y="405" fill="#64748b" font-size="11" font-family="system-ui">热点地址分析 + 缓存感知映射 → TLB Miss 降低 40-60%</text>
    <text x="750" y="385" fill="#10b981" font-size="28" font-weight="bold" font-family="system-ui">③</text>
    
    <!-- Arrow -->
    <line x1="450" y1="430" x2="450" y2="460" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- Layer 4: Algorithm (LATPC) -->
    <rect x="50" y="460" width="800" height="50" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" opacity="0.95"/>
    <rect x="70" y="470" width="8" height="30" rx="4" fill="#f59e0b"/>
    <text x="100" y="490" fill="#f59e0b" font-size="14" font-weight="bold" font-family="system-ui">算法层: LATPC 论文 - Locality-Aware TLB 预取 + MSHR 压缩</text>
    <text x="750" y="490" fill="#f59e0b" font-size="28" font-weight="bold" font-family="system-ui">④</text>
    
    <!-- Arrow marker -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
        </marker>
    </defs>
</svg>