<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="450" fill="#0f172a" rx="16"/>
    
    <!-- Title -->
    <text x="450" y="35" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle" font-family="system-ui">统一内存架构 (Unified Memory Architecture)</text>
    
    <!-- CPU Side -->
    <rect x="30" y="60" width="380" height="360" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="220" y="90" fill="#3b82f6" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">CPU 端</text>
    
    <!-- CPU Core -->
    <rect x="50" y="110" width="340" height="50" rx="8" fill="#334155" stroke="#3b82f6" stroke-width="1"/>
    <text x="220" y="140" fill="#f8fafc" font-size="13" text-anchor="middle" font-family="system-ui">CPU Core (x86/ARM)</text>
    
    <!-- Shared Page Table -->
    <rect x="50" y="175" width="340" height="80" rx="8" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="220" y="200" fill="#8b5cf6" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui">统一页表 (Shared Page Table)</text>
    <text x="220" y="220" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">PML4 → PDPT → PD → PT</text>
    <text x="220" y="240" fill="#64748b" font-size="10" text-anchor="middle" font-family="system-ui">CPU 和 GPU 共享同一套页表结构</text>
    
    <!-- System Memory -->
    <rect x="50" y="270" width="340" height="80" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="220" y="295" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">系统内存 (System Memory)</text>
    <rect x="70" y="310" width="80" height="30" rx="4" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1"/>
    <text x="110" y="330" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">Page A</text>
    <rect x="170" y="310" width="80" height="30" rx="4" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1"/>
    <text x="210" y="330" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">Page B</text>
    <rect x="270" y="310" width="80" height="30" rx="4" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1"/>
    <text x="310" y="330" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">Page C</text>
    
    <!-- GPU Side -->
    <rect x="490" y="60" width="380" height="360" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="680" y="90" fill="#10b981" font-size="16" font-weight="bold" text-anchor="middle" font-family="system-ui">GPU 端</text>
    
    <!-- GPU SMs -->
    <rect x="510" y="110" width="340" height="50" rx="8" fill="#334155" stroke="#10b981" stroke-width="1"/>
    <text x="680" y="140" fill="#f8fafc" font-size="13" text-anchor="middle" font-family="system-ui">GPU SMs (CUDA Cores)</text>
    
    <!-- Shared Page Table (GPU copy) -->
    <rect x="510" y="175" width="340" height="80" rx="8" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="680" y="200" fill="#8b5cf6" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui">统一页表 (Shared Page Table)</text>
    <text x="680" y="220" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">PML4 → PDPT → PD → PT</text>
    <text x="680" y="240" fill="#64748b" font-size="10" text-anchor="middle" font-family="system-ui">与 CPU 完全相同的页表副本</text>
    
    <!-- GPU Memory -->
    <rect x="510" y="270" width="340" height="80" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="680" y="295" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="system-ui">显存 (GPU Memory)</text>
    <rect x="530" y="310" width="80" height="30" rx="4" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="1"/>
    <text x="570" y="330" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">Page A</text>
    <rect x="630" y="310" width="80" height="30" rx="4" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="1"/>
    <text x="670" y="330" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">Page B</text>
    <rect x="730" y="310" width="80" height="30" rx="4" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="1"/>
    <text x="770" y="330" fill="#f8fafc" font-size="10" text-anchor="middle" font-family="system-ui">Page C</text>
    
    <!-- Page Table Sync Arrow -->
    <line x1="410" y1="215" x2="490" y2="215" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow2)" stroke-dasharray="5,3"/>
    <text x="450" y="205" fill="#8b5cf6" font-size="10" text-anchor="middle" font-family="system-ui">页表同步</text>
    
    <!-- Page Migration Arrow -->
    <path d="M 350,325 Q 420,300 530,325" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)" stroke-dasharray="4,2"/>
    <text x="450" y="295" fill="#f59e0b" font-size="10" text-anchor="middle" font-family="system-ui">按需页迁移</text>
    
    <!-- Shared Virtual Address Space -->
    <rect x="30" y="430" width="840" height="0" rx="8" fill="#ec4899" stroke="#ec4899" stroke-width="2"/>
    <text x="450" y="448" fill="#ec4899" font-size="12" text-anchor="middle" font-family="system-ui">共享虚拟地址空间: 0x00000000 ~ 0xFFFFFFFFFFFFFFFF (64-bit)</text>
    
    <!-- Arrow marker -->
    <defs>
        <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
        </marker>
    </defs>
</svg>